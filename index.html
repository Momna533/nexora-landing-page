    <script src="/app.js" defer></script>

    <section
      class="text-center py-20 bg-gradient-to-r from-blue-500 to-indigo-600 text-white"
    >
      <h2 class="text-4xl font-extrabold mb-4">Supercharge Your Workflow</h2>
      <p class="text-lg mb-6">
        YourProductName helps teams stay organized, efficient, and ahead of the

      <a
        href="#signup"
        class="px-6 py-3 bg-white text-blue-600 font-semibold rounded shadow hover:bg-gray-100"
